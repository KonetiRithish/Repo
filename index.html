<!DOCTYPE html>
<html>
<head>
    <title>Rithish</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body Background for Laptop */
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background-image: url("ayyapa images/Homepage.jpg");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;   /* For Laptop */
        }

        /* Heading */
        h1 {
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 40px;
        }

        /* Navigation Table */
        table {
            width: 90%;
            max-width: 1200px;
            margin: 20px auto;
            border-collapse: collapse;
        }

        th {
            background-color: gold;
            padding: 15px;
            border: 2px solid black;
        }

        th a {
            text-decoration: none;
            color: black;
            font-weight: bold;
            display: block;
        }

        th a:hover {
            background-color: orange;
            color: white;
        }

        /* ✅ Mobile Screen Settings */
        @media (max-width: 768px) {

            body {
                background-attachment: scroll; /* Important for Mobile */
                background-size: cover;
                background-position: center;
            }

            h1 {
                font-size: 24px;
            }

            table, tr, th {
                display: block;
                width: 100%;
            }

            th {
                margin-bottom: 5px;
            }
        }

    </style>
</head>

<body>

    <h1>-- AYYAPPA --</h1>

    <table border="2">
        <tr align="center">
            <th><a href="index.html">HOME</a></th>
            <th><a href="image.html">IMAGES</a></th>
            <th><a href="video.html">VIDEO</a></th>
            <th><a href="youtube.html">YOUTUBE</a></th>
        </tr>
    </table>

</body>
</html>
